name: Feature request
description: Propose a new capability or improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What limitation, friction, or missing capability are you trying to address?
      placeholder: It is currently difficult to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want.
      placeholder: Add a way to ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or other designs you considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TUI client (`dartboard`)
        - Headless server (`dartboardd`)
        - Shared library crate
        - Protocol
        - Developer workflow
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Mockups, examples, prior art, or related issues.

