name: Bug report
description: Report a defect, regression, crash, or incorrect behavior.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please provide enough detail to reproduce the problem locally.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the issue.
      placeholder: |
        1. Run ...
        2. Press ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - TUI client (`dartboard`)
        - Headless server (`dartboardd`)
        - WebSocket protocol
        - Editor behavior
        - Rendering
        - Build or release workflow
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Tag, commit SHA, or branch name.
      placeholder: v0.1.0

  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS and version.
      placeholder: macOS 15.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal
      description: Terminal emulator, if relevant.
      placeholder: iTerm2, Terminal.app, WezTerm, Windows Terminal

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output or attach screenshots.
      render: text

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else that would help narrow this down.

