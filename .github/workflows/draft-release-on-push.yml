name: Draft Release On Push

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version to stamp into Cargo.toml for this run (for example 0.1.2)
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.resolve-version.outputs.release_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate manifest placeholder
        shell: bash
        run: |
          CARGO_VERSION=$(
            awk '
              /^\[workspace\.package\]$/ { in_section = 1; next }
              /^\[/ { in_section = 0 }
              in_section && $1 == "version" && $2 == "=" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )

          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not find [workspace.package].version in Cargo.toml"
            exit 1
          fi

          if [ "$CARGO_VERSION" != "0.0.0" ]; then
            echo "::error::Expected Cargo.toml to remain at placeholder version 0.0.0, found $CARGO_VERSION"
            exit 1
          fi

          echo "Manifest placeholder validated: $CARGO_VERSION"

      - name: Resolve release version
        id: resolve-version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            RAW_VERSION="$GITHUB_REF_NAME"
          else
            RAW_VERSION="$INPUT_VERSION"
          fi

          RELEASE_VERSION="${RAW_VERSION#v}"
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version must match X.Y.Z; got '$RAW_VERSION'"
            exit 1
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $RELEASE_VERSION"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Stamp workspace version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          release_version = os.environ["RELEASE_VERSION"]
          cargo_toml = Path("Cargo.toml")
          original = cargo_toml.read_text()
          updated, count = re.subn(
              r'(?m)^version\s*=\s*"0\.0\.0"$',
              f'version = "{release_version}"',
              original,
          )
          expected = 8
          if count != expected:
              raise SystemExit(
                  f"Expected exactly {expected} placeholder version entries in Cargo.toml, found {count}"
              )
          cargo_toml.write_text(updated)
          PY
          cargo update --workspace
          grep 'version = ' Cargo.toml

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries
        shell: bash
        run: |
          ${{ matrix.cross && 'cross' || 'cargo' }} build \
            --locked \
            --release \
            --target ${{ matrix.target }} \
            --package dartboard-cli \
            --package dartboard-server

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive_root="dartboard-${{ matrix.target }}"
          mkdir -p "$archive_root"
          cp README.md LICENSE "$archive_root"/
          cp "target/${{ matrix.target }}/release/dartboard" "$archive_root"/
          cp "target/${{ matrix.target }}/release/dartboardd" "$archive_root"/
          tar czf "${archive_root}.tar.gz" "$archive_root"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          archive_root="dartboard-${{ matrix.target }}"
          mkdir -p "$archive_root"
          cp README.md LICENSE "$archive_root"/
          cp "target/${{ matrix.target }}/release/dartboard.exe" "$archive_root"/
          cp "target/${{ matrix.target }}/release/dartboardd.exe" "$archive_root"/
          7z a "${archive_root}.zip" "$archive_root"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dartboard-${{ matrix.target }}
          path: dartboard-${{ matrix.target }}.*

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes \
            --title "$GITHUB_REF_NAME" \
            artifacts/*
