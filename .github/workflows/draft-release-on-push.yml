name: Draft Release On Push

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(
            awk '
              /^\[workspace\.package\]$/ { in_section = 1; next }
              /^\[/ { in_section = 0 }
              in_section && $1 == "version" && $2 == "=" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )

          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not find [workspace.package].version in Cargo.toml"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) doesn't match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "Version validated: $TAG_VERSION"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries
        shell: bash
        run: |
          ${{ matrix.cross && 'cross' || 'cargo' }} build \
            --locked \
            --release \
            --target ${{ matrix.target }} \
            --package dartboard-cli \
            --package dartboard-server

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive_root="dartboard-${{ matrix.target }}"
          mkdir -p "$archive_root"
          cp README.md LICENSE "$archive_root"/
          cp "target/${{ matrix.target }}/release/dartboard" "$archive_root"/
          cp "target/${{ matrix.target }}/release/dartboardd" "$archive_root"/
          tar czf "${archive_root}.tar.gz" "$archive_root"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          archive_root="dartboard-${{ matrix.target }}"
          mkdir -p "$archive_root"
          cp README.md LICENSE "$archive_root"/
          cp "target/${{ matrix.target }}/release/dartboard.exe" "$archive_root"/
          cp "target/${{ matrix.target }}/release/dartboardd.exe" "$archive_root"/
          7z a "${archive_root}.zip" "$archive_root"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dartboard-${{ matrix.target }}
          path: dartboard-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --generate-notes \
            --title "$GITHUB_REF_NAME" \
            artifacts/*
