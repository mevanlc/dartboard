name: Publish crates.io on Release Published

on:
  release:
    types:
      - published

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release tag matches workspace version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(
            awk '
              /^\[workspace\.package\]$/ { in_section = 1; next }
              /^\[/ { in_section = 0 }
              in_section && $1 == "version" && $2 == "=" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )

          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not find [workspace.package].version in Cargo.toml"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Release tag version ($TAG_VERSION) doesn't match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "Version validated: $TAG_VERSION"

      - name: Dry run publish sequence
        shell: bash
        run: |
          cargo publish --dry-run --locked -p dartboard-core
          cargo publish --dry-run --locked -p dartboard-picker-core
          cargo publish --dry-run --locked -p dartboard-editor
          cargo publish --dry-run --locked -p dartboard-local
          cargo publish --dry-run --locked -p dartboard-client-ws
          cargo publish --dry-run --locked -p dartboard-tui
          cargo publish --dry-run --locked -p dartboard-server
          cargo publish --dry-run --locked -p dartboard-cli

      - name: Publish crates to crates.io
        shell: bash
        run: |
          publish() {
            local package="$1"
            cargo publish --locked -p "$package"
            # Give the crates.io index time to reflect newly published internal deps.
            sleep 30
          }

          publish dartboard-core
          publish dartboard-picker-core
          publish dartboard-editor
          publish dartboard-local
          publish dartboard-client-ws
          publish dartboard-tui
          publish dartboard-server
          publish dartboard-cli
