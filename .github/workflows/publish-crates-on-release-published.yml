name: Publish crates.io on Release Published

on:
  release:
    types:
      - published
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release tag matches workspace version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(
            awk '
              /^\[workspace\.package\]$/ { in_section = 1; next }
              /^\[/ { in_section = 0 }
              in_section && $1 == "version" && $2 == "=" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )

          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not find [workspace.package].version in Cargo.toml"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Release tag version ($TAG_VERSION) doesn't match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "Version validated: $TAG_VERSION"

      - name: Publish crates to crates.io
        shell: bash
        run: |
          verify_then_publish() {
            local package="$1"

            for attempt in $(seq 1 20); do
              if cargo publish --dry-run --locked -p "$package"; then
                break
              fi

              if [ "$attempt" -eq 20 ]; then
                echo "::error::Dry-run verification failed for $package after $attempt attempts"
                exit 1
              fi

              sleep 15
            done

            cargo publish --locked -p "$package"
            sleep 30
          }

          verify_then_publish dartboard-core
          verify_then_publish dartboard-picker-core
          verify_then_publish dartboard-editor
          verify_then_publish dartboard-local
          verify_then_publish dartboard-tui
