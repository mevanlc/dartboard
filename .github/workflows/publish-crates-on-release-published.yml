name: Publish crates.io on Release Published

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release version to stamp into Cargo.toml for this run (for example 0.1.2)
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate manifest placeholder
        shell: bash
        run: |
          CARGO_VERSION=$(
            awk '
              /^\[workspace\.package\]$/ { in_section = 1; next }
              /^\[/ { in_section = 0 }
              in_section && $1 == "version" && $2 == "=" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )

          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not find [workspace.package].version in Cargo.toml"
            exit 1
          fi

          if [ "$CARGO_VERSION" != "0.0.0" ]; then
            echo "::error::Expected Cargo.toml to remain at placeholder version 0.0.0, found $CARGO_VERSION"
            exit 1
          fi

          echo "Manifest placeholder validated: $CARGO_VERSION"

      - name: Resolve release version
        id: resolve-version
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'release' && github.ref_name || inputs.version }}
        run: |
          RAW_VERSION="$RELEASE_VERSION"
          RELEASE_VERSION="${RAW_VERSION#v}"
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version must match X.Y.Z; got '$RAW_VERSION'"
            exit 1
          fi

          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          release_version = os.environ["RELEASE_VERSION"]
          cargo_toml = Path("Cargo.toml")
          original = cargo_toml.read_text()
          updated, count = re.subn(
              r'(?m)^version\s*=\s*"0\.0\.0"$',
              f'version = "{release_version}"',
              original,
          )
          expected = 8
          if count != expected:
              raise SystemExit(
                  f"Expected exactly {expected} placeholder version entries in Cargo.toml, found {count}"
              )
          cargo_toml.write_text(updated)
          PY
          cargo update --workspace

      - name: Publish crates to crates.io
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.resolve-version.outputs.release_version }}
        run: |
          crate_version_exists() {
            local package="$1"
            local version="$2"
            local url="https://crates.io/api/v1/crates/${package}/${version}"
            local status
            status=$(curl -sS -o /dev/null -w "%{http_code}" -A "dartboard-publish-ci" "$url" || true)
            [ "$status" = "200" ]
          }

          verify_then_publish() {
            local package="$1"
            local version="$2"

            if crate_version_exists "$package" "$version"; then
              echo "Skipping $package $version — already on crates.io"
              return 0
            fi

            for attempt in $(seq 1 20); do
              if cargo publish --dry-run --locked -p "$package"; then
                break
              fi

              if [ "$attempt" -eq 20 ]; then
                echo "::error::Dry-run verification failed for $package after $attempt attempts"
                exit 1
              fi

              sleep 15
            done

            cargo publish --locked -p "$package"
            sleep 30
          }

          VERSION="$RELEASE_VERSION"

          verify_then_publish dartboard-core "$VERSION"
          verify_then_publish dartboard-picker-core "$VERSION"
          verify_then_publish dartboard-editor "$VERSION"
          verify_then_publish dartboard-local "$VERSION"
          verify_then_publish dartboard-client-ws "$VERSION"
          verify_then_publish dartboard-tui "$VERSION"
          verify_then_publish dartboard-server "$VERSION"
          verify_then_publish dartboard-cli "$VERSION"
